# Redeploy GitHub Pages when country analytics data changes locally.
#
# Country analytics is a page on the same site (website/country-analytics.html),
# linked from the main hub header. This workflow does NOT rebuild enrich data —
# commit website/data/country-analytics.json after ./scripts/publish_country_data.sh.
#
# The daily Deploy Pages cron skips country enrich; use this workflow (or manual
# Deploy Pages) to publish committed JSON to Pages.

name: Deploy Country Pages

on:
  push:
    branches: [main]
    paths:
      - "website/data/country-analytics.json"
      - "website/data/author-analytics.json"
      - "website/country-analytics.html"
      - "website/author-analytics.html"
      - "website/author-analytics.js"
      - "website/search.html"
      - "website/search.js"
      - "website/country-analytics.js"
      - "website/data/*.json"
      - ".github/workflows/deploy-country-pages.yml"
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify country analytics output
        run: |
          test -f website/country-analytics.html
          test -f website/data/country-analytics.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("website/data/country-analytics.json").read_text(encoding="utf-8"))
          for key in ("generated_at", "data_source", "countries", "coverage"):
              if key not in data:
                  raise SystemExit(f"country-analytics.json missing {key!r}")
          cov = data["coverage"]
          print(
              f"country analytics ok: papers={cov.get('total_papers')} "
              f"resolved={cov.get('resolved')} countries={len(data.get('countries', []))}"
          )
          PY

      - name: Configure views API URL (optional)
        env:
          VIEWS_API_URL: ${{ secrets.VIEWS_API_URL }}
        run: |
          if [ -z "${VIEWS_API_URL}" ]; then
            exit 0
          fi
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          url = os.environ["VIEWS_API_URL"].strip().rstrip("/")
          hub_path = Path("website/data/hub.json")
          hub = json.loads(hub_path.read_text(encoding="utf-8"))
          hub["views_api_url"] = url
          hub_path.write_text(json.dumps(hub, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(f"views_api_url configured: {url}")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
