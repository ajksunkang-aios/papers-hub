# Build papers-hub data (dblp + arXiv + picks) and deploy website/ to GitHub Pages.
#
# Setup (once per repo):
#   Settings → Pages → Build and deployment → Source: GitHub Actions
#   (Optional, for live view counts) Settings → Secrets → VIEWS_API_URL
#     = https://your-view-stats-worker.workers.dev
#
# Schedule: 09:00 Asia/Shanghai (01:00 UTC). Adjust cron if you use another TZ.
# Manual run: Actions → Deploy Pages → Run workflow
#
# Country analytics: dblp.xml person index (offline) by default.
# PICK_YEARS / COUNTRY_YEARS from 2020 onward. Set AUTHOR_ENRICH_ONLINE_DBLP=1
# only when you need slow HTTP fallback for authors missing from the xml index.
#   AUTHOR_ENRICH_OFFLINE=1
#
# Note: view counts update live via the views API (Cloudflare Worker). This workflow
# only publishes the static site and injects views_api_url into hub.json when the
# secret is set. Redeploying Pages does not increment or batch-update view totals.

name: Deploy Pages

on:
  schedule:
    # 09:00 Asia/Shanghai (UTC+8) = 01:00 UTC
    - cron: "0 1 * * *"
  # Manual only besides schedule — push does not trigger the heavy online build.
  workflow_dispatch:
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache dblp XML
        uses: actions/cache@v4
        with:
          path: data/dblp.xml.gz
          key: papers-hub-dblp-xml-v1
          restore-keys: papers-hub-dblp-xml-

      # Author caches must use a unique save key each run (Actions cache keys are
      # immutable). restore-keys pick up the newest prior run. Save even on
      # cancel/failure so partial online progress is not lost.
      - name: Restore author affiliation cache
        id: author-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/dblp-affiliation-cache-os-kernel.json
            data/author-country-cache-os-kernel.json
            data/author-paper-reload-os-kernel.json
            data/author-enrich-os-kernel.json
          key: papers-hub-author-cache-v3-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            papers-hub-author-cache-v3-${{ runner.os }}-
            papers-hub-author-cache-v2-${{ runner.os }}
            papers-hub-author-cache-v1-${{ runner.os }}
            papers-hub-author-cache-
            papers-hub-build-${{ runner.os }}-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            data/abstract-cache-os-kernel.json
            data/arxiv-cache
            data/abstract-enrich-os-kernel.json
            data/dblp-build-os-kernel.json
            data/dblp-person-index.json
            data/dblp-person-index-manifest.json
          key: papers-hub-build-${{ runner.os }}-${{ hashFiles('hubs/os-kernel/**', 'core/**', 'crawl_arxiv_recent.py', 'build_top_monthly.py', 'enrich_author_metadata.py', 'build_country_analytics.py') }}
          restore-keys: |
            papers-hub-build-${{ runner.os }}-

      - name: Daily build (dblp + arXiv + picks + online country analytics)
        env:
          CI: "true"
          HUB: os-kernel
          ABSTRACT_SKIP: "1"
          # Enrich + country analytics: 2020–present (not full historical dblp dump).
          PICK_YEARS: "2020,2021,2022,2023,2024,2025,2026"
          COUNTRY_YEARS: "2020,2021,2022,2023,2024,2025,2026"
          # Offline dblp.xml person index; no HTTP unless AUTHOR_ENRICH_ONLINE_DBLP=1.
          AUTHOR_ENRICH_OFFLINE: "0"
          AUTHOR_COUNTRY_OFFLINE: "0"
        run: ./scripts/daily_update.sh

      - name: Save author affiliation cache
        if: ${{ always() && hashFiles('data/dblp-affiliation-cache-os-kernel.json') != '' }}
        uses: actions/cache/save@v4
        with:
          path: |
            data/dblp-affiliation-cache-os-kernel.json
            data/author-country-cache-os-kernel.json
            data/author-paper-reload-os-kernel.json
            data/author-enrich-os-kernel.json
          key: papers-hub-author-cache-v3-${{ runner.os }}-${{ github.run_id }}

      - name: Sync view zones to worker config
        run: python3 scripts/sync_view_zones.py

      - name: Test view stats helpers
        run: python3 -m unittest tests/test_view_stats.py

      - name: Test author country + dblp affiliation helpers
        run: python3 -m unittest tests/test_author_country.py tests/test_dblp_affiliations.py tests/test_dblp_person_index.py

      - name: Verify view zones stay in sync
        run: python3 scripts/sync_view_zones.py --check

      - name: Configure views API URL (optional)
        env:
          VIEWS_API_URL: ${{ secrets.VIEWS_API_URL }}
        run: |
          if [ -z "${VIEWS_API_URL}" ]; then
            echo "VIEWS_API_URL secret not set; worldwide views bar stays hidden on Pages"
            echo "unless hubs/os-kernel/hub.json already has views_api_url."
            exit 0
          fi
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          url = os.environ["VIEWS_API_URL"].strip().rstrip("/")
          if not url.startswith("http"):
              raise SystemExit(f"VIEWS_API_URL must be an http(s) URL, got: {url!r}")

          hub_path = Path("website/data/hub.json")
          hub = json.loads(hub_path.read_text(encoding="utf-8"))
          hub["views_api_url"] = url
          hub_path.write_text(json.dumps(hub, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(f"views_api_url configured for Pages: {url}")
          PY

      - name: Verify site output
        run: |
          test -f website/index.html
          test -f website/views.js
          test -f website/country-analytics.html
          test -f website/data/country-analytics.json
          test -f website/data/conferences.json
          test -f website/data/top-monthly.json
          test -f website/data/today-broadcast.json
          test -f website/today-broadcast-data.js
          python3 - <<'PY'
          import json
          from pathlib import Path
          p = json.loads(Path("website/data/today-broadcast.json").read_text(encoding="utf-8"))
          for key in ("generated_at", "date_label", "picks", "all_picks"):
              if key not in p:
                  raise SystemExit(f"today-broadcast.json missing {key!r}")
          print(f"broadcast ok: {p['date_label']} ({len(p.get('picks', []))} preview / {len(p.get('all_picks', []))} total)")

          hub = json.loads(Path("website/data/hub.json").read_text(encoding="utf-8"))
          if hub.get("views_api_url"):
              print(f"views ok: api={hub['views_api_url']}")
          else:
              print("views: api not configured (bar hidden until VIEWS_API_URL secret or hub.json URL)")

          country = json.loads(Path("website/data/country-analytics.json").read_text(encoding="utf-8"))
          cov = country.get("coverage") or {}
          resolved = int(cov.get("resolved") or 0)
          total = int(cov.get("total_papers") or 0)
          print(
              f"country analytics ok: source={country.get('data_source')} "
              f"papers={total} resolved={resolved} "
              f"countries={len(country.get('countries', []))}"
          )
          aff_path = Path("data/dblp-affiliation-cache-os-kernel.json")
          if aff_path.is_file():
              aff = json.loads(aff_path.read_text(encoding="utf-8"))
              entries = aff.get("entries") or {}
              hits = sum(1 for v in entries.values() if v.get("affiliations"))
              print(f"dblp affiliation cache: entries={len(entries)} hits={hits}")
          if total > 100 and resolved == 0:
              print(
                  "WARNING: country analytics resolved=0; online dblp author enrichment "
                  "produced no country codes yet (cache will grow on later runs)"
              )
          PY
          echo "Pages artifact: $(du -sh website | cut -f1)"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
