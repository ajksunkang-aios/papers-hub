# Daily site build: dblp + arXiv + top picks + broadcast + search index → GitHub Pages.
#
# Keeps recent arXiv and picks fresh (09:00 UTC+8). Skips affiliation enrich;
# country/author analytics are rebuilt monthly by deploy-country-pages.yml.

name: Deploy Pages

on:
  schedule:
    # 09:00 Asia/Shanghai (UTC+8) = 01:00 UTC
    - cron: "0 1 * * *"
  # Manual only besides schedule — push does not trigger the heavy online build.
  workflow_dispatch:
    inputs:
      arxiv_force:
        description: Force fresh arXiv crawl (ignore 24h staleness cache)
        type: boolean
        default: true
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache dblp XML
        uses: actions/cache@v4
        with:
          path: data/dblp.xml.gz
          key: papers-hub-dblp-xml-v1
          restore-keys: papers-hub-dblp-xml-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            data/abstract-cache-os-kernel.json
            data/arxiv-cache
            data/abstract-enrich-os-kernel.json
            data/dblp-build-os-kernel.json
          key: papers-hub-build-${{ runner.os }}-${{ hashFiles('hubs/os-kernel/**', 'core/**', 'crawl_arxiv_recent.py', 'build_top_monthly.py', 'parse_dblp_xml.py') }}
          restore-keys: |
            papers-hub-build-${{ runner.os }}-

      - name: Daily build (arXiv + picks + search; analytics from repo)
        env:
          CI: "true"
          HUB: os-kernel
          ABSTRACT_SKIP: "1"
          DAILY_SKIP_AUTHOR_ENRICH: "1"
          DAILY_SKIP_COUNTRY_ANALYTICS: "1"
          PICK_YEARS: "2020,2021,2022,2023,2024,2025,2026"
          ARXIV_FORCE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.arxiv_force == 'true' && '1' || '0' }}
        run: ./scripts/daily_update.sh

      - name: Sync view zones to worker config
        run: python3 scripts/sync_view_zones.py

      - name: Test view stats helpers
        run: python3 -m unittest tests/test_view_stats.py

      - name: Verify view zones stay in sync
        run: python3 scripts/sync_view_zones.py --check

      - name: Configure views API URL (optional)
        env:
          VIEWS_API_URL: ${{ secrets.VIEWS_API_URL }}
        run: |
          if [ -z "${VIEWS_API_URL}" ]; then
            echo "VIEWS_API_URL secret not set; worldwide views bar stays hidden on Pages"
            echo "unless hubs/os-kernel/hub.json already has views_api_url."
            exit 0
          fi
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          url = os.environ["VIEWS_API_URL"].strip().rstrip("/")
          if not url.startswith("http"):
              raise SystemExit(f"VIEWS_API_URL must be an http(s) URL, got: {url!r}")

          hub_path = Path("website/data/hub.json")
          hub = json.loads(hub_path.read_text(encoding="utf-8"))
          hub["views_api_url"] = url
          hub_path.write_text(json.dumps(hub, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(f"views_api_url configured for Pages: {url}")
          PY

      - name: Verify site output
        run: |
          test -f website/index.html
          test -f website/views.js
          test -f website/country-analytics.html
          test -f website/data/country-analytics.json
          test -f website/author-analytics.html
          test -f website/data/author-analytics.json
          test -f website/search.html
          test -f website/search.js
          test -f website/data/search-index.json
          test -f website/tech-map.html
          test -f website/tech-map.js
          test -f website/data/tech-map.json
          test -f website/data/conferences.json
          test -f website/data/top-monthly.json
          test -f website/data/today-broadcast.json
          test -f website/today-broadcast-data.js
          python3 - <<'PY'
          import json
          from pathlib import Path
          p = json.loads(Path("website/data/today-broadcast.json").read_text(encoding="utf-8"))
          for key in ("generated_at", "date_label", "picks", "all_picks"):
              if key not in p:
                  raise SystemExit(f"today-broadcast.json missing {key!r}")
          print(f"broadcast ok: {p['date_label']} ({len(p.get('picks', []))} preview / {len(p.get('all_picks', []))} total)")

          search = json.loads(Path("website/data/search-index.json").read_text(encoding="utf-8"))
          for key in ("generated_at", "count", "papers", "match_fields"):
              if key not in search:
                  raise SystemExit(f"search-index.json missing {key!r}")
          print(f"search index ok: papers={search.get('count')}")

          hub = json.loads(Path("website/data/hub.json").read_text(encoding="utf-8"))
          if hub.get("views_api_url"):
              print(f"views ok: api={hub['views_api_url']}")
          else:
              print("views: api not configured (bar hidden until VIEWS_API_URL secret or hub.json URL)")

          country = json.loads(Path("website/data/country-analytics.json").read_text(encoding="utf-8"))
          cov = country.get("coverage") or {}
          print(
              f"country analytics (from repo/monthly job): papers={cov.get('total_papers')} "
              f"resolved={cov.get('resolved')}"
          )
          PY
          echo "Pages artifact: $(du -sh website | cut -f1)"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
